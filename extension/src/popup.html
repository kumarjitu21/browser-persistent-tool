<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Workspace Memory</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        margin: 0;
        padding: 16px;
        width: 280px;
        color: #1a1a1a;
      }
      h1 {
        font-size: 14px;
        margin: 0 0 12px;
      }
      .meta,
      .hint {
        font-size: 12px;
        color: #666;
        margin-bottom: 8px;
        line-height: 1.5;
      }
      .hint {
        margin-bottom: 12px;
      }
      button {
        width: 100%;
        padding: 8px 12px;
        margin-bottom: 8px;
        border: 1px solid #ccc;
        border-radius: 6px;
        background: #fff;
        cursor: pointer;
        font-size: 13px;
      }
      button.primary {
        background: #2563eb;
        border-color: #2563eb;
        color: #fff;
      }
      button:hover {
        opacity: 0.9;
      }
      #status {
        font-size: 12px;
        margin-top: 8px;
        min-height: 16px;
      }
    </style>
  </head>
  <body>
    <h1>Workspace Memory</h1>
    <div class="meta" id="meta">Loading status…</div>
    <p class="hint">Manual capture only — no background sync.</p>
    <button class="primary" id="snapshot">Capture Once</button>
    <button id="restore">Restore Latest Session</button>
    <div id="status"></div>
    <script type="module" src="./popup.ts"></script>
  </body>
</html>
